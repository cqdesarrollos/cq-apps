<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROE &amp; TIR · CQ Desarrollos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --verde:#1C3D35;
    --verde-2:#274F45;
    --verde-3:#345E52;
    --sand:#F5F3EF;
    --sand-2:#EAE6DC;
    --card:#FFFFFF;
    --texto:#1C3D35;
    --texto-sub:#6B7A74;
    --borde:rgba(28,61,53,0.12);
    --ok:#3E7D5A;
    --ok-bg:#E7F1EA;
    --warn:#B8843A;
    --warn-bg:#F7EDDB;
    --bad:#A8503F;
    --bad-bg:#F5E4DF;
    --gris:#8E8A80;
    --gris-bg:#EDEBE5;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--texto);
    font-family:'Space Grotesk',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--sand);}

  /* Header */
  .topbar{
    background:var(--verde);
    color:var(--sand);
    padding:18px 18px 14px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:20;
  }
  .topbar h1{font-size:18px;font-weight:700;margin:0;letter-spacing:.2px;}
  .topbar .sub{font-size:11px;color:#B9C7C0;font-family:'JetBrains Mono',monospace;margin-top:2px;}
  .icon-btn{
    background:rgba(245,243,239,0.12);
    border:1px solid rgba(245,243,239,0.25);
    color:var(--sand);
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;cursor:pointer;flex-shrink:0;
  }

  /* Tabs */
  .tabs{
    display:flex;gap:6px;padding:10px 14px;background:var(--verde);
    position:sticky;top:62px;z-index:19;
  }
  .tab-btn{
    flex:1;padding:9px 4px;border:none;border-radius:999px;
    background:rgba(245,243,239,0.1);color:#CBD6D1;
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;
    cursor:pointer;transition:.15s;
  }
  .tab-btn.active{background:var(--sand);color:var(--verde);}

  main{flex:1;padding:16px 14px 90px;}
  .tab-content{display:none;}
  .tab-content.active{display:block;animation:fade .15s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}

  /* Cards */
  .card{
    background:var(--card);
    border:1px solid var(--borde);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{font-size:14px;margin:0 0 12px;color:var(--verde);font-weight:700;}
  .card h2 .n{color:var(--texto-sub);font-weight:500;font-size:12px;margin-left:6px;}

  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{
    display:block;font-size:11.5px;color:var(--texto-sub);margin-bottom:5px;font-weight:500;
  }
  .field input, .field select{
    width:100%;padding:10px 11px;border:1px solid var(--borde);border-radius:10px;
    font-size:14.5px;font-family:'JetBrains Mono',monospace;color:var(--texto);
    background:var(--sand);
  }
  .field input:focus, .field select:focus{outline:2px solid var(--verde-3);outline-offset:1px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .hint{font-size:11px;color:var(--texto-sub);margin-top:5px;}

  /* Chips */
  .chip-group{display:flex;gap:8px;}
  .chip{
    flex:1;text-align:center;padding:9px 6px;border-radius:999px;
    border:1px solid var(--borde);background:var(--sand);color:var(--texto-sub);
    font-weight:600;font-size:13px;cursor:pointer;
  }
  .chip.active{background:var(--verde);color:var(--sand);border-color:var(--verde);}

  /* Cost rows */
  .cost-row{display:grid;grid-template-columns:70px 1fr 30px;gap:8px;align-items:center;margin-bottom:8px;}
  .cost-row input{padding:8px 9px;}
  .row-del{
    width:28px;height:28px;border-radius:50%;border:none;background:var(--bad-bg);
    color:var(--bad);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .add-row-btn{
    width:100%;padding:9px;border:1.5px dashed var(--borde);border-radius:10px;
    background:transparent;color:var(--verde-3);font-weight:600;font-size:13px;cursor:pointer;
    margin-top:2px;
  }
  .total-line{
    display:flex;justify-content:space-between;font-size:12.5px;margin-top:10px;
    padding-top:10px;border-top:1px dashed var(--borde);color:var(--texto-sub);
  }
  .total-line b{color:var(--texto);font-family:'JetBrains Mono',monospace;}
  .total-line.warn b{color:var(--warn);}

  /* Buttons */
  .btn-primary{
    width:100%;padding:13px;border:none;border-radius:12px;
    background:var(--verde);color:var(--sand);font-weight:700;font-size:14.5px;
    cursor:pointer;font-family:'Space Grotesk',sans-serif;
  }
  .btn-secondary{
    width:100%;padding:12px;border:1px solid var(--verde);border-radius:12px;
    background:transparent;color:var(--verde);font-weight:600;font-size:13.5px;
    cursor:pointer;margin-top:8px;font-family:'Space Grotesk',sans-serif;
  }

  /* KPI badges */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
  .kpi{
    border-radius:12px;padding:10px 12px;border:1px solid var(--borde);
  }
  .kpi .label{font-size:10.5px;color:var(--texto-sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
  .kpi .value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;margin-top:2px;}
  .kpi .band{font-size:11px;margin-top:3px;font-weight:600;}
  .kpi.green{background:var(--ok-bg);} .kpi.green .value, .kpi.green .band{color:var(--ok);}
  .kpi.yellow{background:var(--warn-bg);} .kpi.yellow .value, .kpi.yellow .band{color:var(--warn);}
  .kpi.red{background:var(--bad-bg);} .kpi.red .value, .kpi.red .band{color:var(--bad);}
  .kpi.gray{background:var(--gris-bg);} .kpi.gray .value, .kpi.gray .band{color:var(--gris);}

  .res-line{display:flex;justify-content:space-between;padding:7px 0;font-size:13.5px;border-bottom:1px solid var(--borde);}
  .res-line:last-child{border-bottom:none;}
  .res-line .v{font-family:'JetBrains Mono',monospace;font-weight:600;}
  .res-line.ganancia .v{color:var(--ok);font-weight:700;}

  .badge{
    display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;
    font-size:12px;font-weight:700;
  }
  .badge.green{background:var(--ok-bg);color:var(--ok);}
  .badge.yellow{background:var(--warn-bg);color:var(--warn);}
  .badge.red{background:var(--bad-bg);color:var(--bad);}
  .badge.gray{background:var(--gris-bg);color:var(--gris);}

  .cell-green{color:var(--ok);font-weight:700;}
  .cell-yellow{color:var(--warn);font-weight:700;}
  .cell-red{color:var(--bad);font-weight:700;}
  .cell-gray{color:var(--gris);font-weight:600;}

  /* Flujo table */
  .flujo-toggle{
    text-align:center;font-size:12.5px;color:var(--verde-3);font-weight:600;cursor:pointer;padding:4px 0;
  }
  .table-wrap{overflow-x:auto;margin-top:10px;-webkit-overflow-scrolling:touch;}
  table{border-collapse:collapse;width:100%;font-family:'JetBrains Mono',monospace;font-size:11.5px;}
  table th, table td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--borde);white-space:nowrap;}
  table th{color:var(--texto-sub);font-weight:600;text-align:right;position:sticky;top:0;background:var(--card);}
  table td:first-child, table th:first-child{text-align:left;}
  table tr.neg td{color:var(--bad);}

  /* Obras list */
  .obra-card{
    background:var(--card);border:1px solid var(--borde);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;
  }
  .obra-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .obra-nombre{font-weight:700;font-size:15px;}
  .obra-stats{display:flex;gap:14px;margin-top:8px;font-size:12px;}
  .obra-stats .s b{display:block;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--texto);}
  .obra-stats .s span{color:var(--texto-sub);font-size:10.5px;}
  .obra-actions{display:flex;gap:8px;margin-top:10px;}
  .obra-actions button{
    flex:1;padding:8px;border-radius:9px;border:1px solid var(--borde);background:var(--sand);
    font-size:12px;font-weight:600;color:var(--verde);cursor:pointer;
  }
  .obra-actions button.del{color:var(--bad);}

  .empty-state{
    text-align:center;padding:50px 20px;color:var(--texto-sub);
  }
  .empty-state .ic{font-size:34px;margin-bottom:10px;}
  .empty-state p{font-size:13.5px;margin:0;line-height:1.5;}

  /* Comparar */
  .compare-pick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .pick-chip{
    padding:8px 13px;border-radius:999px;border:1px solid var(--borde);background:var(--card);
    font-size:12.5px;font-weight:600;color:var(--texto-sub);cursor:pointer;
  }
  .pick-chip.active{background:var(--verde);color:var(--sand);border-color:var(--verde);}
  .compare-table{margin-top:6px;}
  .compare-table th{font-family:'Space Grotesk',sans-serif;}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(28,61,53,0.5);z-index:50;
    display:none;align-items:flex-end;justify-content:center;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--sand);width:100%;max-width:480px;border-radius:20px 20px 0 0;
    padding:20px;max-height:82vh;overflow-y:auto;
  }
  .modal h3{margin:0 0 4px;font-size:16px;color:var(--verde);}
  .modal .close{
    float:right;background:none;border:none;font-size:20px;color:var(--texto-sub);cursor:pointer;
  }
  .leg-block{margin-top:16px;}
  .leg-block h4{font-size:12.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--texto-sub);margin:0 0 6px;}
  .leg-item{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--borde);}
  .leg-item span:last-child{font-family:'JetBrains Mono',monospace;font-weight:600;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--verde);color:var(--sand);padding:11px 20px;border-radius:999px;
    font-size:13px;font-weight:600;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>

const STORAGE_KEY = 'cq_roetir_obras';
let obras = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
migrarObras();
function migrarObras(){
  let changed = false;
  obras.forEach(o=>{
    if(!o.costos){
      o.costos = repartoParejo(o.costoTotal, o.mes0);
      changed = true;
    }
    (o.unidades||[]).forEach(u=>{
      if(u.comisionPct===undefined){
        u.comisionPct = (o.comisionPct!=null ? o.comisionPct : 2.5);
        changed = true;
      }
      if(u.tipo==='Pozo' && !u.cuotas){
        const cant = Number(u.cantCuotas||0);
        const m1 = Number(u.mes1raCuota||0);
        const val = cant>0 ? (Number(u.precio||0)-Number(u.anticipo||0))/cant : 0;
        u.cuotas = [];
        for(let k=0;k<cant;k++) u.cuotas.push({mes:m1+k, monto:val});
        changed = true;
      }
    });
  });
  if(changed) saveStorage();
}
let editingId = null;
let comparePicked = [];

function unidadDefault(){ return { tipo:'Pozo', precio:0, comisionPct:2.5, mesVenta:1, anticipo:0, cuotas:[{mes:2, monto:0}], mesCobro:1, comisionMes:1 }; }

let draft = {
  nombre:'', costoTotal:0, costos:[{mes:0, monto:0}],
  unidades:[ unidadDefault(), unidadDefault() ]
};

/* ============================ UTILS ============================ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtMoney(n){ if(n==null||isNaN(n)) return '—'; return '$'+Math.round(n).toLocaleString('es-AR'); }
function fmtPct(n){ if(n==null||isNaN(n)||!isFinite(n)) return '—'; return (n*100).toFixed(1)+'%'; }
function fmtNum(n,d=0){ if(n==null||isNaN(n)||!isFinite(n)) return '—'; return Number(n).toFixed(d).replace(/(\.\d*?)0+$/,'$1').replace(/\.$/,''); }
function fmtMes(n){ if(n==null) return '—'; return n+(n===1?' mes':' meses'); }
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function saveStorage(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(obras)); }

/* ============================ MOTOR DE CÁLCULO ============================ */
function repartoParejo(costoTotal, mes0){
  const total = Number(costoTotal||0), m0 = Number(mes0||0);
  const resto = Math.max(total - m0, 0);
  const porMes = Math.round(resto/7);
  const arr = [{mes:0, monto:m0}];
  for(let m=1;m<=7;m++) arr.push({mes:m, monto:porMes});
  return arr;
}

function computeFlujo(esc){
  const costosArr = esc.costos || [];
  let maxMes = 0;
  costosArr.forEach(c=> maxMes=Math.max(maxMes, c.mes));
  esc.unidades.forEach(u=>{
    if(u.tipo==='Pozo'){
      const cuotaMeses = (u.cuotas||[]).map(c=>c.mes);
      maxMes = Math.max(maxMes, u.mesVenta||0, ...(cuotaMeses.length?cuotaMeses:[0]));
    } else {
      maxMes = Math.max(maxMes, u.mesCobro);
    }
    maxMes = Math.max(maxMes, u.comisionMes);
  });
  const costoMap = {};
  costosArr.forEach(c=> costoMap[c.mes] = (costoMap[c.mes]||0) + Number(c.monto||0));

  const flujo=[]; let acumulado=0;
  for(let m=0;m<=maxMes;m++){
    const costoProyecto = costoMap[m]||0;
    let ingresos=[0,0], comisiones=[0,0];
    esc.unidades.forEach((u,idx)=>{
      let ingreso=0;
      if(u.tipo==='Pozo'){
        if(m===u.mesVenta) ingreso = Number(u.anticipo||0);
        else {
          const cs = (u.cuotas||[]).filter(c=>c.mes===m);
          if(cs.length) ingreso = cs.reduce((a,c)=>a+Number(c.monto||0),0);
        }
      } else {
        if(m===u.mesCobro) ingreso = Number(u.precio||0);
      }
      const comision = (m===u.comisionMes) ? Number(u.precio||0)*(Number(u.comisionPct||0)/100) : 0;
      ingresos[idx]=ingreso; comisiones[idx]=comision;
    });
    const flujoNeto = ingresos[0]+ingresos[1]-costoProyecto-comisiones[0]-comisiones[1];
    acumulado += flujoNeto;
    flujo.push({mes:m, costoProyecto, ingresoU1:ingresos[0], comisionU1:comisiones[0], ingresoU2:ingresos[1], comisionU2:comisiones[1], flujoNeto, acumulado});
  }
  return flujo;
}

function npv(rate, flows){
  let s=0;
  for(let t=0;t<flows.length;t++) s += flows[t]/Math.pow(1+rate,t);
  return s;
}
function irr(flows){
  // TIR robusta: busca cambios de signo de VAN en varios tramos.
  // Esto evita que algunas obras queden "sin datos" cuando el flujo tiene varios cambios de signo
  // o cuando la raíz no queda encerrada entre -99% y 5000% en el primer intento.
  const clean = (flows||[]).map(f=>Number(f)||0);
  const hasPos = clean.some(f=>f>0), hasNeg = clean.some(f=>f<0);
  if(!hasPos || !hasNeg) return null;

  function bisect(lo, hi){
    let fLo=npv(lo,clean), fHi=npv(hi,clean);
    if(!isFinite(fLo) || !isFinite(fHi) || fLo*fHi>0) return null;
    for(let i=0;i<180;i++){
      const mid=(lo+hi)/2, fMid=npv(mid,clean);
      if(!isFinite(fMid)) return null;
      if(Math.abs(fMid)<1e-7) return mid;
      if((fLo<0 && fMid<0)||(fLo>0 && fMid>0)){ lo=mid; fLo=fMid; }
      else { hi=mid; fHi=fMid; }
    }
    return (lo+hi)/2;
  }

  // Escaneo fino en tasas mensuales razonables: -99% a 300% mensual.
  // Incluye muchos casos reales sin forzar resultados absurdos.
  let roots=[];
  let prevR=-0.99, prevV=npv(prevR,clean);
  const steps=1200, maxR=3;
  for(let i=1;i<=steps;i++){
    const r = -0.99 + (maxR+0.99)*i/steps;
    const v = npv(r,clean);
    if(!isFinite(prevV) || !isFinite(v)){ prevR=r; prevV=v; continue; }
    if(Math.abs(v)<1e-7){ roots.push(r); }
    else if(prevV*v<0){
      const root=bisect(prevR,r);
      if(root!=null && isFinite(root)) roots.push(root);
    }
    prevR=r; prevV=v;
  }
  if(!roots.length) return null;

  // Si hay más de una raíz, usamos la positiva más baja; si no, la mayor negativa.
  const positivas = roots.filter(r=>r>=0).sort((a,b)=>a-b);
  if(positivas.length) return positivas[0];
  return roots.sort((a,b)=>b-a)[0];
}

function computeResultados(esc){
  const flujo = computeFlujo(esc);
  const ingresoTotal = flujo.reduce((a,f)=>a+f.ingresoU1+f.ingresoU2,0);
  const comisionTotal = flujo.reduce((a,f)=>a+f.comisionU1+f.comisionU2,0);
  const costoTotal = flujo.reduce((a,f)=>a+f.costoProyecto,0);
  const ganancia = ingresoTotal - comisionTotal - costoTotal;
  const acumulados = flujo.map(f=>f.acumulado);
  const capitalMaximo = -Math.min(0, Math.min(...acumulados));
  const roe = capitalMaximo>0 ? ganancia/capitalMaximo : null;
  const tirMensual = irr(flujo.map(f=>f.flujoNeto));
  const tirAnual = tirMensual!=null ? Math.pow(1+tirMensual,12)-1 : null;
  let payback = null;
  for(let i=0;i<acumulados.length;i++){ if(acumulados[i]>=0){ payback=i; break; } }
  const capitalCosto = costoTotal>0 ? capitalMaximo/costoTotal : null;
  return { flujo, ingresoTotal, comisionTotal, costoTotal, ganancia, capitalMaximo, roe, tirMensual, tirAnual, payback, capitalCosto };
}

/* ============================ BANDAS / SEMÁFORO ============================ */
function bandROE(roe){
  if(roe==null) return {color:'gray', label:'—', sub:'sin datos'};
  const p=roe*100;
  if(p<40) return {color:'red', label:'Bajo', sub:'no conviene'};
  if(p<70) return {color:'yellow', label:'Aceptable', sub:'evaluar'};
  if(p<=120) return {color:'green', label:'Bueno', sub:'avanzar'};
  return {color:'green', label:'Excelente', sub:'escalar'};
}
function bandTirAnual(t){
  if(t==null) return {color:'gray', label:'—', sub:'sin datos'};
  const p=t*100;
  if(p<60) return {color:'red', label:'Mala', sub:'no conviene'};
  if(p<100) return {color:'yellow', label:'Floja', sub:'evaluar'};
  if(p<=200) return {color:'green', label:'Buena', sub:'avanzar'};
  return {color:'green', label:'Excelente', sub:'acelerar'};
}
function bandTirMensual(t){
  if(t==null) return {color:'gray', label:'—', sub:'sin datos'};
  const p=t*100;
  if(p<4) return {color:'red', label:'Mala', sub:''};
  if(p<6) return {color:'yellow', label:'Floja', sub:''};
  if(p<10) return {color:'green', label:'Buena', sub:''};
  return {color:'green', label:'Excelente', sub:''};
}
function bandPayback(p){
  if(p==null) return {color:'gray', label:'—', sub:'no recupera'};
  if(p>10) return {color:'red', label:'Lento', sub:''};
  if(p>=8) return {color:'yellow', label:'Revisar', sub:''};
  if(p>=6) return {color:'green', label:'Bueno', sub:''};
  return {color:'green', label:'Excelente', sub:''};
}
function bandCapitalCosto(cc){
  if(cc==null) return {color:'gray', label:'—', sub:''};
  const p=cc*100;
  if(p>70) return {color:'red', label:'Pesado', sub:''};
  if(p>=50) return {color:'yellow', label:'Evaluar', sub:''};
  if(p>=30) return {color:'green', label:'Bueno', sub:''};
  return {color:'green', label:'Liviano', sub:''};
}

function bandCapitalInvertido(cap){
  if(cap==null) return {color:'gray', label:'—', sub:''};
  if(cap<80000) return {color:'green', label:'Cómodo', sub:''};
  if(cap<=120000) return {color:'yellow', label:'Cuidar', sub:''};
  return {color:'red', label:'Limitar', sub:''};
}
function cellSpan(text, color){ return `<span class="cell-${color}">${text}</span>`; }

const COLOR_HEX = { green:'#3E7D5C', yellow:'#B8843A', red:'#A8503F', gray:'#8E8A80' };
const INDICADORES_CHART = {
  'Ganancia':       { get:r=>r.ganancia,      isPct:false, isMonths:false, band:null },
  'Ingreso total':  { get:r=>r.ingresoTotal,  isPct:false, isMonths:false, band:null },
  'Capital máximo': { get:r=>r.capitalMaximo, isPct:false, isMonths:false, band:bandCapitalInvertido },
  'ROE':            { get:r=>r.roe,           isPct:true,  isMonths:false, band:bandROE },
  'TIR anual':      { get:r=>r.tirAnual,      isPct:true,  isMonths:false, band:bandTirAnual },
  'TIR mensual':    { get:r=>r.tirMensual,    isPct:true,  isMonths:false, band:bandTirMensual },
  'Payback':        { get:r=>r.payback,       isPct:false, isMonths:true,  band:bandPayback },
  'Capital/Costo':  { get:r=>r.capitalCosto,  isPct:true,  isMonths:false, band:bandCapitalCosto },
};
let chartIndicador = 'Ganancia';
let chartInstance = null;
function pickChartIndicador(key){
  const pills = document.querySelector('.compare-indicator-pills');
  const savedScroll = pills ? pills.scrollLeft : 0;
  chartIndicador = key;
  renderCompareResult();
  requestAnimationFrame(()=>{
    const newPills = document.querySelector('.compare-indicator-pills');
    if(newPills) newPills.scrollLeft = savedScroll;
  });
}
function renderCompareChart(datos){
  const canvas = document.getElementById('compare-chart');
  if(!canvas || typeof Chart==='undefined') return;
  const def = INDICADORES_CHART[chartIndicador];
  const labels = datos.map(d=>d.o.nombre||'—');
  const raw = datos.map(d=>def.get(d.r));
  const values = raw.map(v=> v==null ? 0 : (def.isPct ? v*100 : v));
  const colors = datos.map(d=>{
    const v = def.get(d.r);
    return def.band ? COLOR_HEX[def.band(v).color] : '#236450';
  });

  function chartLabel(v){
    if(v==null) return '';
    if(def.isPct) return fmtPct(v);
    if(def.isMonths) return v+'m';
    return fmtMoney(v);
  }

  const barValueLabels = {
    id:'barValueLabelsPremium',
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      const meta = chart.getDatasetMeta(0);
      ctx.save();
      ctx.font = "700 10px 'JetBrains Mono', monospace";
      ctx.fillStyle = '#16372F';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      meta.data.forEach((bar, i)=>{
        const label = chartLabel(raw[i]);
        if(!label) return;
        const pos = bar.tooltipPosition();
        ctx.fillText(label, pos.x, pos.y - 7);
      });
      ctx.restore();
    }
  };

  if(chartInstance){ chartInstance.destroy(); }
  const maxVal = Math.max(...values, 0);
  chartInstance = new Chart(canvas, {
    type:'bar',
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor:colors,
        borderRadius:12,
        borderSkipped:false,
        maxBarThickness:42,
        categoryPercentage:.62,
        barPercentage:.82
      }]
    },
    plugins:[barValueLabels],
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{ padding:{ top:28, right:8, bottom:2, left:2 } },
      animation:{ duration:450, easing:'easeOutQuart' },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:'#16372F',
          titleFont:{family:"'Space Grotesk', sans-serif", size:12, weight:'700'},
          bodyFont:{family:"'JetBrains Mono', monospace", size:12, weight:'700'},
          padding:10,
          cornerRadius:10,
          callbacks:{ label:(ctx)=>{
            const v = raw[ctx.dataIndex];
            if(v==null) return 'Sin datos';
            if(def.isPct) return fmtPct(v);
            if(def.isMonths) return v+' meses';
            return fmtMoney(v);
          }}
        }
      },
      scales:{
        y:{
          beginAtZero:true,
          suggestedMax:maxVal*1.18,
          grid:{ color:'rgba(22,55,47,.08)', drawBorder:false },
          ticks:{
            font:{family:"'JetBrains Mono', monospace", size:10, weight:'600'},
            color:'#6E7B74',
            callback:(v)=> def.isPct? v+'%' : (def.isMonths? v+'m' : (Math.abs(v)>=1000 ? '$'+Math.round(v/1000)+'k' : v))
          }
        },
        x:{
          grid:{ display:false, drawBorder:false },
          ticks:{ font:{family:"'Space Grotesk', sans-serif", size:11, weight:'800'}, color:'#16372F' }
        }
      }
    }
  });
}
function decision(r){
  if(r.tirAnual==null || r.roe==null) return {color:'gray', label:'SIN DATOS', desc:'completá los dos escenarios para comparar'};
  const tir = r.tirAnual*100, roe = r.roe*100, cap = r.capitalMaximo;
  if(tir>120 && roe>70 && cap<80000) return {color:'green', label:'IR A POZO', desc:'Bajar precio si hace falta · acelerar ventas · maximizar rotación'};
  if(tir>=60 && tir<=120 && roe>=60 && roe<=100 && cap>=60000 && cap<=100000) return {color:'yellow', label:'MANTENER', desc:'Equilibrio · riesgo controlado · negocio estable'};
  if(tir<60 && roe<60 && cap>100000) return {color:'red', label:'NO FORZAR', desc:'Vender terminado · no bajar precio de más · cuidar margen'};
  return {color:'gray', label:'MIXTO', desc:'No cumple todas las condiciones de una regla — evaluar caso a caso'};
}

/* ============================ RENDER: TABS ============================ */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

/* ============================ RENDER: UNIDADES ============================ */
function renderUnidad(idx){
  const u = draft.unidades[idx];
  const card = document.getElementById('unidad-card-'+idx);
  const esPozo = u.tipo==='Pozo';
  card.innerHTML = `
    <h2>Unidad ${idx+1}</h2>
    <div class="field">
      <label>Tipo de venta</label>
      <div class="chip-group">
        <div class="chip ${esPozo?'active':''}" onclick="setTipoUnidad(${idx},'Pozo')">Pozo</div>
        <div class="chip ${!esPozo?'active':''}" onclick="setTipoUnidad(${idx},'Terminada')">Terminada</div>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Precio unidad ($)</label>
        <input type="number" value="${u.precio||''}" onchange="updU(${idx},'precio',this.value)">
      </div>
      <div class="field">
        <label>% comisión</label>
        <input type="number" step="0.1" value="${u.comisionPct||''}" onchange="updU(${idx},'comisionPct',this.value)">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Mes de ${esPozo?'seña':'cobro'}</label>
        <input type="number" value="${esPozo?u.mesVenta:u.mesCobro}" onchange="updU(${idx},'${esPozo?'mesVenta':'mesCobro'}',this.value)">
      </div>
      ${esPozo ? `
      <div class="field">
        <label>Anticipo ($)</label>
        <input type="number" value="${u.anticipo||''}" onchange="updU(${idx},'anticipo',this.value)">
      </div>
      ` : `
      <div class="field">
        <label>Mes de comisión</label>
        <input type="number" value="${u.comisionMes||''}" onchange="updU(${idx},'comisionMes',this.value)">
      </div>
      `}
    </div>
    ${esPozo ? `
    <div class="field">
      <label>Cuotas (${(u.cuotas||[]).length})</label>
      <div id="cuotas-rows-${idx}">
        ${(u.cuotas||[]).map((c,i)=>`
          <div class="cost-row">
            <input type="number" value="${c.mes}" onchange="updateCuotaMes(${idx},${i},this.value)" placeholder="Mes">
            <input type="number" value="${c.monto}" onchange="updateCuotaMonto(${idx},${i},this.value)" placeholder="Monto $">
            <button class="row-del" onclick="delCuotaRow(${idx},${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <button class="add-row-btn" onclick="addCuotaRow(${idx})">+ Agregar cuota</button>
      <div class="total-line ${Math.abs(totalCuotas(u)-((u.precio||0)-(u.anticipo||0)))>1?'warn':''}">
        <span>Total cuotas (precio − anticipo: ${fmtMoney((u.precio||0)-(u.anticipo||0))})</span><b class="mono">${fmtMoney(totalCuotas(u))}</b>
      </div>
    </div>
    <div class="field">
      <label>Mes de comisión</label>
      <input type="number" value="${u.comisionMes||''}" onchange="updU(${idx},'comisionMes',this.value)">
    </div>
    ` : ``}
  `;
}
function totalCuotas(u){ return (u.cuotas||[]).reduce((a,c)=>a+Number(c.monto||0),0); }
function addCuotaRow(idx){
  const u = draft.unidades[idx];
  if(!u.cuotas) u.cuotas=[];
  const maxMes = u.cuotas.length ? Math.max(...u.cuotas.map(c=>c.mes)) : (Number(u.mesVenta)||0);
  u.cuotas.push({mes:maxMes+1, monto:0});
  renderUnidad(idx); recalc();
}
function delCuotaRow(idx,i){ draft.unidades[idx].cuotas.splice(i,1); renderUnidad(idx); recalc(); }
function updateCuotaMes(idx,i,v){ draft.unidades[idx].cuotas[i].mes = Number(v)||0; renderUnidad(idx); recalc(); }
function updateCuotaMonto(idx,i,v){ draft.unidades[idx].cuotas[i].monto = Number(v)||0; renderUnidad(idx); recalc(); }

function setTipoUnidad(idx, tipo){
  draft.unidades[idx].tipo = tipo;
  if(tipo==='Terminada'){ draft.unidades[idx].comisionMes = draft.unidades[idx].mesCobro || draft.unidades[idx].comisionMes; }
  else {
    draft.unidades[idx].comisionMes = draft.unidades[idx].mesVenta || draft.unidades[idx].comisionMes;
    if(!draft.unidades[idx].cuotas || !draft.unidades[idx].cuotas.length){
      draft.unidades[idx].cuotas = [{mes:(Number(draft.unidades[idx].mesVenta)||0)+1, monto:0}];
    }
  }
  renderUnidad(idx); recalc();
}
function updU(idx, key, val){
  draft.unidades[idx][key] = Number(val)||0;
  if(key==='mesCobro' && draft.unidades[idx].tipo==='Terminada'){} // libre
  renderUnidad(idx); recalc();
}

/* ============================ RENDER: COSTOS ============================ */
function renderCostos(){
  const wrap = document.getElementById('costos-rows');
  if(!wrap) return;
  wrap.innerHTML = draft.costos.map((c,i)=>`
    <div class="cost-row">
      <input type="number" value="${c.mes}" onchange="updateCostoMes(${i}, this.value)" placeholder="Mes">
      <input type="number" value="${c.monto}" onchange="updateCostoMonto(${i}, this.value)" placeholder="Monto $">
      <button class="row-del" onclick="delCostoRow(${i})">✕</button>
    </div>
  `).join('');
  document.getElementById('costos-count').textContent = '('+draft.costos.length+')';
  const total = draft.costos.reduce((a,c)=>a+Number(c.monto||0),0);
  document.getElementById('costos-total').textContent = fmtMoney(total);
  const line = document.getElementById('costos-total-line');
  if(line) line.classList.toggle('warn', draft.costoTotal>0 && Math.abs(total-draft.costoTotal)>1);
}
function addCostoRow(){
  const maxMes = draft.costos.length ? Math.max(...draft.costos.map(c=>c.mes)) : -1;
  draft.costos.push({mes:maxMes+1, monto:0});
  recalc();
}
function delCostoRow(i){ draft.costos.splice(i,1); recalc(); }
function updateCostoMes(i,v){ draft.costos[i].mes = Number(v)||0; recalc(); }
function updateCostoMonto(i,v){ draft.costos[i].monto = Number(v)||0; recalc(); }
function repartirSaldo(){
  const total = draft.costoTotal||0;
  const mes0Row = draft.costos.find(c=>c.mes===0);
  const mes0 = mes0Row ? Number(mes0Row.monto)||0 : 0;
  const nuevos = repartoParejo(total, mes0);
  draft.costos = draft.costos.filter(c=> c.mes===0 || c.mes>7 || c.mes<0);
  nuevos.slice(1).forEach(c=> draft.costos.push(c));
  draft.costos.sort((a,b)=>a.mes-b.mes);
  recalc();
  toast('Saldo repartido en 7 meses');
}

/* ============================ RENDER: RESULTADOS ============================ */

/* ============================ GUARDAR / CARGAR / LIMPIAR ============================ */
function syncFormToDraft(){
  draft.nombre = document.getElementById('f-nombre').value.trim();
  draft.costoTotal = Number(document.getElementById('f-costoTotal').value)||0;
}
['f-nombre','f-costoTotal'].forEach(id=>{
  document.getElementById(id).addEventListener('input', ()=>{ syncFormToDraft(); recalc(); });
});

function guardarObra(){
  syncFormToDraft();
  if(!draft.nombre){ toast('Poné un código de obra'); return; }
  const esc = JSON.parse(JSON.stringify(draft));
  if(editingId){
    const i = obras.findIndex(o=>o.id===editingId);
    if(i>-1) obras[i] = {...obras[i], ...esc, updatedAt:Date.now()};
  } else {
    obras.push({...esc, id:uid(), createdAt:Date.now(), updatedAt:Date.now()});
  }
  saveStorage();
  toast('Obra guardada');
  limpiarForm();
  document.querySelector('.tab-btn[data-tab="obras"]').click();
}

function limpiarForm(){
  editingId = null;
  draft = { nombre:'', costoTotal:0, costos:[{mes:0, monto:0}], unidades:[ unidadDefault(), unidadDefault() ] };
  document.getElementById('f-nombre').value='';
  document.getElementById('f-costoTotal').value='';
  flujoVisible=false;
  renderCostos(); renderUnidad(0); renderUnidad(1); recalc();
}

function cargarObra(id){
  const o = obras.find(x=>x.id===id);
  if(!o) return;
  editingId = id;
  draft = JSON.parse(JSON.stringify(o));
  document.getElementById('f-nombre').value = draft.nombre;
  document.getElementById('f-costoTotal').value = draft.costoTotal || '';
  renderCostos(); renderUnidad(0); renderUnidad(1); recalc();
  document.querySelector('.tab-btn[data-tab="calc"]').click();
}

function duplicarObra(id){
  const o = obras.find(x=>x.id===id);
  if(!o) return;
  const copia = JSON.parse(JSON.stringify(o));
  copia.id = uid(); copia.nombre = o.nombre + ' (copia)'; copia.createdAt = Date.now(); copia.updatedAt = Date.now();
  obras.push(copia); saveStorage(); renderObras();
  toast('Obra duplicada');
}

function eliminarObra(id){
  if(!confirm('¿Eliminar esta obra?')) return;
  obras = obras.filter(o=>o.id!==id);
  saveStorage(); renderObras();
}

function exportarDatos(){
  const blob = new Blob([JSON.stringify(obras, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fecha = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `obras_roe_tir_${fecha}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importarDatos(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error('formato inválido');
      const reemplazar = obras.length===0 || confirm('¿Reemplazar las obras actuales por las importadas?\n\nAceptar = reemplazar todo.\nCancelar = combinar con las que ya tenés.');
      if(reemplazar){
        obras = data;
      } else {
        data.forEach(o=>{
          if(obras.find(x=>x.id===o.id)) o = {...o, id:uid()};
          obras.push(o);
        });
      }
      migrarObras();
      saveStorage();
      renderObras();
      toast('Datos importados');
    }catch(err){
      toast('El archivo no es un JSON válido de esta app');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function renderComparar(){

    pickWrap.innerHTML = `<div class="empty-state" style="padding:20px;"><p>Guardá al menos 2 obras para comparar.</p></div>`;

    return;
  }
  pickWrap.innerHTML = obras.map(o=>`
    <div class="pick-chip ${comparePicked.includes(o.id)?'active':''}" onclick="togglePick('${o.id}')">${o.nombre||'(sin nombre)'}</div>
  `).join('');
  renderCompareResult();
}
function togglePick(id){
  if(comparePicked.includes(id)){
    comparePicked = comparePicked.filter(x=>x!==id);
  } else {
    comparePicked.push(id);
  }
  renderComparar();
}
function renderCompareResult(){
  const wrap = document.getElementById('compare-result');
  const picked = obras.filter(o=>comparePicked.includes(o.id));
  if(picked.length<2){ wrap.innerHTML=''; return; }

  const datos = picked.map(o=>({o, r:computeResultados(o)}));
  const validNums = arr => arr.filter(v=>v!==null && v!==undefined && isFinite(Number(v))).map(Number);
  const avgRaw = key => {
    const vals = validNums(datos.map(d=>d.r[key]));
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  };
  const sumMoney = key => datos.reduce((a,d)=>a+(Number(d.r[key])||0),0);
  const sums = {
    ingresoTotal: sumMoney('ingresoTotal'),
    comisionTotal: sumMoney('comisionTotal'),
    costoTotal: sumMoney('costoTotal'),
    ganancia: sumMoney('ganancia'),
    capitalMaximo: sumMoney('capitalMaximo')
  };
  const avgs = {
    roe: avgRaw('roe'),
    tirMensual: avgRaw('tirMensual'),
    tirAnual: avgRaw('tirAnual'),
    payback: avgRaw('payback'),
    capitalCosto: avgRaw('capitalCosto')

    ['ROE', 'roe', d=>cellSpan(fmtPct(d.r.roe), bandROE(d.r.roe).color), false, cellSpan(fmtPct(avgs.roe), bandROE(avgs.roe).color), 'Prom.'],
    ['TIR mensual', 'tirMensual', d=>cellSpan(fmtPct(d.r.tirMensual), bandTirMensual(d.r.tirMensual).color), false, cellSpan(fmtPct(avgs.tirMensual), bandTirMensual(avgs.tirMensual).color), 'Prom.'],
    ['TIR anual', 'tirAnual', d=>cellSpan(fmtPct(d.r.tirAnual), bandTirAnual(d.r.tirAnual).color), false, cellSpan(fmtPct(avgs.tirAnual), bandTirAnual(avgs.tirAnual).color), 'Prom.'],
    ['Payback', 'payback', d=>cellSpan(d.r.payback==null?'—':d.r.payback+'m', bandPayback(d.r.payback).color), false, cellSpan(avgs.payback==null?'—':fmtNum(avgs.payback,1)+'m', bandPayback(avgs.payback).color), 'Prom.'],

  ];

        <div class="compare-sum-card"><div class="lbl">Ingreso total</div><div class="val">${fmtMoney(sums.ingresoTotal)}</div></div>

      else if(/Unidad 1/i.test(t)) h.insertAdjacentHTML('afterbegin','<span style="font-size:18px">🏠</span>');
      else if(/Unidad 2/i.test(t)) h.insertAdjacentHTML('afterbegin','<span style="font-size:18px">🏠</span>');
      else if(/Resultados/i.test(t)) h.insertAdjacentHTML('afterbegin','<span style="font-size:18px">📈</span>');
      else if(/Elegí/i.test(t)) h.insertAdjacentHTML('afterbegin','<span style="font-size:18px">🎯</span>');
      else if(/Comparación/i.test(t)) h.insertAdjacentHTML('afterbegin','<span style="font-size:18px">📋</span>');
      else if(/Gráfico/i.test(t)) h.insertAdjacentHTML('afterbegin','<span style="font-size:18px">📊</span>');
      h.dataset.icoDone='1';
    });
  }
  document.addEventListener('DOMContentLoaded', enhance);
  document.addEventListener('click', function(){setTimeout(enhance,80)});
  setTimeout(enhance,200);
})();
</script>


<script id="cq-online-status-js">
(function(){
  function actualizarConexion(){
    document.querySelectorAll('.cq-online-status').forEach(function(el){
      const online=navigator.onLine;
      el.classList.toggle('offline',!online);
      const txt=el.querySelector('.cq-online-text');
      if(txt) txt.textContent=online?'Con conexión':'Sin conexión';
      el.title=online?'Dispositivo conectado a internet':'Dispositivo sin conexión a internet';
    });
  }
  window.addEventListener('online',actualizarConexion);
  window.addEventListener('offline',actualizarConexion);
  document.addEventListener('DOMContentLoaded',actualizarConexion);
  actualizarConexion();
})();
</script>
